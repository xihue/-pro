<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>注册 — 游戏梦工厂</title>
    <style>
        /* ═══════════════════════════════════════════
           MOBILE FIRST — simple card
           ═══════════════════════════════════════════ */
        *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

        body {
            font-family: "PingFang SC", "Noto Sans SC", -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
            background: #eef7f2;
            min-height: 100vh; min-height: 100dvh;
            display: flex; align-items: center; justify-content: center;
            padding: 20px;
        }
        .card {
            width: 100%; max-width: 340px;
            background: #fff; border-radius: 20px;
            padding: 32px 26px;
            box-shadow: 0 4px 24px rgba(80, 140, 120, 0.08);
            position: relative; z-index: 5;
        }
        .card .icon { text-align: center; font-size: 44px; margin-bottom: 6px; }
        .card h1 { text-align: center; font-size: 20px; font-weight: 700; color: #2d6a4f; margin-bottom: 2px; }
        .card .sub { text-align: center; font-size: 13px; color: #999; margin-bottom: 22px; }
        .flash { padding: 8px 12px; border-radius: 8px; font-size: 12px; margin-bottom: 10px; text-align: center; }
        .flash-error { background: #fef2f2; color: #d44; border: 1px solid #fecaca; }
        .flash-success { background: #f0fdf4; color: #2a8; border: 1px solid #bbf7d0; }
        .field { margin-bottom: 14px; }
        .field label { display: block; font-size: 12px; font-weight: 600; color: #5a7a6a; margin-bottom: 6px; letter-spacing: 0.5px; }
        .field input {
            width: 100%; padding: 11px 14px;
            border: 1px solid #d8e8dc; border-radius: 10px;
            font-size: 15px; font-family: inherit; color: #2a4a3a;
            outline: none; -webkit-appearance: none;
            transition: border-color 0.2s, box-shadow 0.2s;
        }
        .field input:focus { border-color: #52b788; box-shadow: 0 0 0 3px rgba(82,183,136,0.1); }
        .field input::placeholder { color: #b8d4c0; }
        .btn {
            width: 100%; padding: 13px; border: none; border-radius: 10px;
            font-size: 15px; font-weight: 700; font-family: inherit;
            color: #fff; background: #52b788; cursor: pointer;
            letter-spacing: 1.5px; margin-top: 4px; position: relative; overflow: hidden;
            transition: transform 0.2s, box-shadow 0.3s;
        }
        .btn:active { transform: scale(0.97); }
        .link { text-align: center; margin-top: 16px; font-size: 13px; color: #999; }
        .link a { color: #52b788; text-decoration: none; font-weight: 500; }

        /* 手机端隐藏所有装饰 */
        .deco, .deco-star, .particle, .arc, .illust { display: none; }

        /* ═══════════════════════════════════════════
           DESKTOP ONLY — warm green growth theme
           ═══════════════════════════════════════════ */
        @media (min-width: 768px) {
            body {
                background:
                    radial-gradient(ellipse 55% 45% at 18% 22%, rgba(200,235,210,0.2) 0%, transparent 55%),
                    radial-gradient(ellipse 50% 40% at 78% 28%, rgba(180,225,200,0.22) 0%, transparent 55%),
                    radial-gradient(ellipse 60% 50% at 52% 65%, rgba(160,210,185,0.18) 0%, transparent 55%),
                    radial-gradient(ellipse 70% 60% at 50% 40%, rgba(230,245,235,0.5) 0%, #eef7f2 100%);
                overflow: hidden;
            }

            /* ══ 卡片悬浮感 ══ */
            .card {
                padding: 38px 32px;
                background: rgba(255,255,255,0.85);
                backdrop-filter: blur(12px);
                -webkit-backdrop-filter: blur(12px);
                border: 1px solid rgba(255,255,255,0.7);
                box-shadow:
                    0 8px 50px rgba(60,120,90,0.1),
                    0 2px 8px rgba(60,120,90,0.05),
                    0 0 0 1px rgba(255,255,255,0.5) inset;
                transform: translateY(-2px);
                transition: transform 0.4s, box-shadow 0.4s;
            }
            .card:hover { transform: translateY(-4px); box-shadow: 0 14px 60px rgba(60,120,90,0.15), 0 0 0 1px rgba(255,255,255,0.5) inset; }

            /* ══ 卡片顶部缎带 ══ */
            .card::before {
                content: "";
                position: absolute;
                top: -3px; left: 30px; right: 30px;
                height: 6px;
                border-radius: 6px;
                background: linear-gradient(90deg, #a8d8b8, #78c8a0, #52b788, #a8d8b8);
                background-size: 200% 100%;
                animation: ribbonShine 4s ease-in-out infinite;
            }
            @keyframes ribbonShine {
                0%, 100% { background-position: 0% 50%; }
                50% { background-position: 100% 50%; }
            }

            /* ══ 按钮魔法光晕 ══ */
            .btn {
                box-shadow: 0 4px 20px rgba(82,183,136,0.35);
                transition: transform 0.25s, box-shadow 0.4s;
            }
            .btn::after {
                content: "";
                position: absolute;
                top: 0; left: -100%;
                width: 60%; height: 100%;
                background: linear-gradient(90deg, transparent, rgba(255,255,255,0.22), transparent);
                transform: skewX(-20deg);
                transition: left 0.6s;
            }
            .btn:hover {
                transform: translateY(-3px);
                box-shadow: 0 8px 35px rgba(82,183,136,0.5), 0 0 50px rgba(130,210,160,0.2);
            }
            .btn:hover::after { left: 120%; }

            /* ══ 星轨弧线 ══ */
            .arc { display: block; position: absolute; pointer-events: none; }
            .arc1 {
                width: 600px; height: 400px;
                border: 2px solid transparent;
                border-top-color: rgba(140,200,165,0.2);
                border-radius: 50%;
                top: -180px; left: 30%;
                transform: rotate(-12deg);
                animation: arcSway 10s ease-in-out infinite;
            }
            .arc2 {
                width: 500px; height: 350px;
                border: 2px solid transparent;
                border-top-color: rgba(160,215,180,0.15);
                border-radius: 50%;
                bottom: -160px; right: -100px;
                transform: rotate(15deg);
                animation: arcSway 12s ease-in-out infinite;
                animation-delay: -4s;
            }
            .arc3 {
                width: 400px; height: 300px;
                border: 1.5px solid transparent;
                border-right-color: rgba(140,200,165,0.12);
                border-radius: 50%;
                top: 40%; left: -180px;
                transform: rotate(8deg);
                animation: arcSway 14s ease-in-out infinite;
                animation-delay: -7s;
            }
            @keyframes arcSway {
                0%, 100% { transform: rotate(-12deg) scale(1); }
                50% { transform: rotate(-8deg) scale(1.03); }
            }

            /* ══ 温热粒子（暖绿/金色调） ══ */
            .particle { display: block; position: absolute; border-radius: 50%; pointer-events: none; }
            .p0 {
                width: 10px; height: 10px;
                background: #fcd34d;
                box-shadow: 0 0 18px 6px rgba(252,211,77,0.55), 0 0 35px 12px rgba(252,211,77,0.18);
            }
            .p1 {
                width: 8px; height: 8px;
                background: #6ee7b7;
                box-shadow: 0 0 14px 5px rgba(110,231,183,0.5), 0 0 28px 10px rgba(110,231,183,0.15);
            }
            .p2 {
                width: 12px; height: 12px;
                background: #fde68a;
                box-shadow: 0 0 20px 7px rgba(253,230,138,0.5), 0 0 38px 14px rgba(253,230,138,0.12);
            }
            .p3 {
                width: 7px; height: 7px;
                background: #a7f3d0;
                box-shadow: 0 0 12px 4px rgba(167,243,208,0.5), 0 0 24px 8px rgba(167,243,208,0.15);
            }
            .p4 {
                width: 9px; height: 9px;
                background: #fcd34d;
                box-shadow: 0 0 16px 5px rgba(252,211,77,0.45), 0 0 30px 10px rgba(252,211,77,0.12);
            }
            .p5 {
                width: 6px; height: 6px;
                background: #fde68a;
                box-shadow: 0 0 10px 3px rgba(253,230,138,0.55), 0 0 20px 8px rgba(253,230,138,0.18);
            }
            .p6 {
                width: 11px; height: 11px;
                background: #6ee7b7;
                box-shadow: 0 0 18px 6px rgba(110,231,183,0.45), 0 0 32px 11px rgba(110,231,183,0.12);
            }
            .p7 {
                width: 7px; height: 7px;
                background: #86efac;
                box-shadow: 0 0 13px 4px rgba(134,239,172,0.5), 0 0 26px 9px rgba(134,239,172,0.15);
            }
            @keyframes floatParticle {
                0%, 100% { transform: translate(0, 0) scale(1); }
                25% { transform: translate(12px, -18px) scale(1.2); }
                50% { transform: translate(-6px, -28px) scale(0.85); }
                75% { transform: translate(-14px, -10px) scale(1.1); }
            }

            /* ══ 热咖啡杯插画 ══ */
            .illust { display: block; }
            .coffee {
                position: absolute;
                bottom: 18%; left: 7%;
                pointer-events: none;
                animation: coffeeFloat 5s ease-in-out infinite;
            }
            .coffee-cup {
                width: 44px; height: 38px;
                background: linear-gradient(180deg, #fff 0%, #fef9e7 100%);
                border-radius: 6px 6px 18px 18px;
                border: 2px solid #d4c5a0;
                box-shadow: 0 4px 14px rgba(180,160,120,0.2), inset 0 4px 8px rgba(210,180,130,0.15);
                position: relative;
            }
            .coffee-cup::after {
                content: "";
                position: absolute;
                right: -14px; top: 6px;
                width: 16px; height: 14px;
                border: 2px solid #d4c5a0;
                border-left: none;
                border-radius: 0 10px 10px 0;
            }
            .coffee-steam {
                margin-top: -18px;
                display: flex; gap: 6px; justify-content: center;
            }
            .coffee-steam span {
                width: 2px; height: 10px;
                background: rgba(180,160,120,0.3);
                border-radius: 1px;
                animation: steamUp 2s ease-out infinite;
            }
            .coffee-steam span:nth-child(1) { animation-delay: 0s; height: 8px; }
            .coffee-steam span:nth-child(2) { animation-delay: 0.6s; height: 12px; }
            .coffee-steam span:nth-child(3) { animation-delay: 1.2s; height: 9px; }
            @keyframes coffeeFloat {
                0%, 100% { transform: translateY(0) rotate(0deg); }
                50% { transform: translateY(-12px) rotate(-2deg); }
            }
            @keyframes steamUp {
                0% { opacity: 0.6; transform: translateY(0) scaleX(0.8); }
                100% { opacity: 0; transform: translateY(-20px) scaleX(2); }
            }
        }
    </style>
</head>
<body>

    <!-- ══ 桌面端装饰层 ══ -->
    <div class="arc arc1"></div>
    <div class="arc arc2"></div>
    <div class="arc arc3"></div>

    <!-- 温热粒子 -->
    <div class="particle p0" style="top:12%; left:18%; animation: floatParticle 7s ease-in-out infinite; animation-delay: 0s;"></div>
    <div class="particle p1" style="top:20%; right:15%; animation: floatParticle 8s ease-in-out infinite; animation-delay: -1s;"></div>
    <div class="particle p2" style="top:55%; left:8%; animation: floatParticle 6.5s ease-in-out infinite; animation-delay: -2s;"></div>
    <div class="particle p3" style="top:35%; right:10%; animation: floatParticle 7.5s ease-in-out infinite; animation-delay: -3s;"></div>
    <div class="particle p4" style="top:65%; right:20%; animation: floatParticle 8.5s ease-in-out infinite; animation-delay: -4s;"></div>
    <div class="particle p5" style="top:78%; left:22%; animation: floatParticle 6s ease-in-out infinite; animation-delay: -1.5s;"></div>
    <div class="particle p6" style="top:45%; left:14%; animation: floatParticle 7.8s ease-in-out infinite; animation-delay: -3.5s;"></div>
    <div class="particle p7" style="top:28%; left:78%; animation: floatParticle 8.2s ease-in-out infinite; animation-delay: -5s;"></div>

    <!-- 热咖啡杯 -->
    <div class="illust coffee">
        <div class="coffee-steam"><span></span><span></span><span></span></div>
        <div class="coffee-cup"></div>
    </div>

    <!-- ══ 卡片 ══ -->
    <div class="card">
        <div class="icon">🎮</div>
        <h1>游戏梦工厂</h1>
        <p class="sub">领取魔盒 · 开始创造</p>

        {% with messages = get_flashed_messages(with_categories=true) %}
        {% if messages %}
        {% for category, message in messages %}
        <div class="flash flash-{{ category }}">{{ message }}</div>
        {% endfor %}
        {% endif %}
        {% endwith %}

        <form method="POST" action="{{ url_for('auth.register') }}">
            <div class="field">
                <label>用户名</label>
                <input type="text" name="username" placeholder="取一个名字" required autofocus>
            </div>
            <div class="field">
                <label>密码</label>
                <input type="password" name="password" placeholder="至少 4 个字符" required>
            </div>
            <div class="field">
                <label>确认密码</label>
                <input type="password" name="password2" placeholder="再输一遍" required>
            </div>
            <button type="submit" class="btn">注 册</button>
        </form>

        <p class="link">已有魔盒？<a href="{{ url_for('auth.login') }}">打开它</a></p>
    </div>

</body>
</html>
