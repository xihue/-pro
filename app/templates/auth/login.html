<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>登录 — 游戏梦工厂</title>
    <style>
        /* ═══════════════════════════════════════════
           MOBILE FIRST — simple card
           ═══════════════════════════════════════════ */
        *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

        body {
            font-family: "PingFang SC", "Noto Sans SC", -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
            background: #f3eef8;
            min-height: 100vh; min-height: 100dvh;
            display: flex; align-items: center; justify-content: center;
            padding: 20px;
        }
        .card {
            width: 100%; max-width: 340px;
            background: #fff; border-radius: 20px;
            padding: 32px 26px;
            box-shadow: 0 4px 24px rgba(100, 80, 160, 0.08);
            position: relative; z-index: 5;
        }
        .card .icon { text-align: center; font-size: 44px; margin-bottom: 6px; }
        .card h1 { text-align: center; font-size: 20px; font-weight: 700; color: #4338ca; margin-bottom: 2px; }
        .card .sub { text-align: center; font-size: 13px; color: #999; margin-bottom: 22px; }
        .flash { padding: 8px 12px; border-radius: 8px; font-size: 12px; margin-bottom: 10px; text-align: center; }
        .flash-error { background: #fef2f2; color: #d44; border: 1px solid #fecaca; }
        .flash-success { background: #f0fdf4; color: #3a8; border: 1px solid #bbf7d0; }
        .field { margin-bottom: 14px; }
        .field label { display: block; font-size: 12px; font-weight: 600; color: #6b6b8a; margin-bottom: 6px; letter-spacing: 0.5px; }
        .field input {
            width: 100%; padding: 11px 14px;
            border: 1px solid #e0dde8; border-radius: 10px;
            font-size: 15px; font-family: inherit; color: #3a3a5a;
            outline: none; -webkit-appearance: none;
            transition: border-color 0.2s, box-shadow 0.2s;
        }
        .field input:focus { border-color: #7c4dff; box-shadow: 0 0 0 3px rgba(124,77,255,0.1); }
        .field input::placeholder { color: #c0bcd0; }
        .remember { display: flex; align-items: center; gap: 8px; font-size: 13px; color: #777; margin-bottom: 18px; cursor: pointer; }
        .remember input { width: 16px; height: 16px; accent-color: #7c4dff; }
        .btn {
            width: 100%; padding: 13px; border: none; border-radius: 10px;
            font-size: 15px; font-weight: 700; font-family: inherit;
            color: #fff; background: #7c4dff; cursor: pointer;
            letter-spacing: 1.5px; position: relative; overflow: hidden;
            transition: transform 0.2s, box-shadow 0.3s;
        }
        .btn:active { transform: scale(0.97); }
        .link { text-align: center; margin-top: 16px; font-size: 13px; color: #999; }
        .link a { color: #7c4dff; text-decoration: none; font-weight: 500; }

        /* 手机端隐藏所有装饰 */
        .deco, .deco-star, .particle, .arc, .illust { display: none; }

        /* ═══════════════════════════════════════════
           DESKTOP ONLY — magical warm purple theme
           ═══════════════════════════════════════════ */
        @media (min-width: 768px) {
            body {
                background:
                    radial-gradient(ellipse 55% 45% at 18% 22%, rgba(255,220,180,0.18) 0%, transparent 55%),
                    radial-gradient(ellipse 50% 40% at 78% 28%, rgba(220,180,230,0.2) 0%, transparent 55%),
                    radial-gradient(ellipse 60% 50% at 52% 65%, rgba(180,170,220,0.16) 0%, transparent 55%),
                    radial-gradient(ellipse 70% 60% at 50% 40%, rgba(240,235,250,0.5) 0%, #f3eef8 100%);
                overflow: hidden;
            }

            /* ══ 卡片悬浮感 ══ */
            .card {
                padding: 38px 32px;
                background: rgba(255,255,255,0.85);
                backdrop-filter: blur(12px);
                -webkit-backdrop-filter: blur(12px);
                border: 1px solid rgba(255,255,255,0.7);
                box-shadow:
                    0 8px 50px rgba(100,70,150,0.1),
                    0 2px 8px rgba(100,70,150,0.05),
                    0 0 0 1px rgba(255,255,255,0.5) inset;
                transform: translateY(-2px);
                transition: transform 0.4s, box-shadow 0.4s;
            }
            .card:hover { transform: translateY(-4px); box-shadow: 0 14px 60px rgba(100,70,150,0.15), 0 0 0 1px rgba(255,255,255,0.5) inset; }

            /* ══ 卡片顶部缎带 ══ */
            .card::before {
                content: "";
                position: absolute;
                top: -3px; left: 30px; right: 30px;
                height: 6px;
                border-radius: 6px;
                background: linear-gradient(90deg, #f9a8d4, #c4b5fd, #a78bfa, #f9a8d4);
                background-size: 200% 100%;
                animation: ribbonShine 4s ease-in-out infinite;
            }
            @keyframes ribbonShine {
                0%, 100% { background-position: 0% 50%; }
                50% { background-position: 100% 50%; }
            }

            /* ══ 按钮魔法光晕 ══ */
            .btn {
                box-shadow: 0 4px 20px rgba(124,77,255,0.35);
                transition: transform 0.25s, box-shadow 0.4s;
            }
            .btn::after {
                content: "";
                position: absolute;
                top: 0; left: -100%;
                width: 60%; height: 100%;
                background: linear-gradient(90deg, transparent, rgba(255,255,255,0.2), transparent);
                transform: skewX(-20deg);
                transition: left 0.6s;
            }
            .btn:hover {
                transform: translateY(-3px);
                box-shadow: 0 8px 35px rgba(124,77,255,0.5), 0 0 50px rgba(179,136,255,0.2);
            }
            .btn:hover::after { left: 120%; }

            /* ══ 星轨弧线 ══ */
            .arc { display: block; position: absolute; pointer-events: none; }
            .arc1 {
                width: 600px; height: 400px;
                border: 2px solid transparent;
                border-top-color: rgba(200,180,220,0.2);
                border-radius: 50%;
                top: -180px; left: 30%;
                transform: rotate(-12deg);
                animation: arcSway 10s ease-in-out infinite;
            }
            .arc2 {
                width: 500px; height: 350px;
                border: 2px solid transparent;
                border-top-color: rgba(220,200,240,0.15);
                border-radius: 50%;
                bottom: -160px; right: -100px;
                transform: rotate(15deg);
                animation: arcSway 12s ease-in-out infinite;
                animation-delay: -4s;
            }
            .arc3 {
                width: 400px; height: 300px;
                border: 1.5px solid transparent;
                border-right-color: rgba(200,180,220,0.12);
                border-radius: 50%;
                top: 40%; left: -180px;
                transform: rotate(8deg);
                animation: arcSway 14s ease-in-out infinite;
                animation-delay: -7s;
            }
            @keyframes arcSway {
                0%, 100% { transform: rotate(-12deg) scale(1); }
                50% { transform: rotate(-8deg) scale(1.03); }
            }

            /* ══ 温热粒子 ══ */
            .particle { display: block; position: absolute; border-radius: 50%; pointer-events: none; }
            .p0 {
                width: 10px; height: 10px;
                background: #fbbf8a;
                box-shadow: 0 0 18px 6px rgba(251,191,138,0.6), 0 0 35px 12px rgba(251,191,138,0.2);
            }
            .p1 {
                width: 8px; height: 8px;
                background: #f9a8d4;
                box-shadow: 0 0 14px 5px rgba(249,168,212,0.55), 0 0 28px 10px rgba(249,168,212,0.18);
            }
            .p2 {
                width: 12px; height: 12px;
                background: #fde9a8;
                box-shadow: 0 0 20px 7px rgba(253,233,168,0.55), 0 0 38px 14px rgba(253,233,168,0.15);
            }
            .p3 {
                width: 7px; height: 7px;
                background: #e9d5ff;
                box-shadow: 0 0 12px 4px rgba(233,213,255,0.55), 0 0 24px 8px rgba(233,213,255,0.18);
            }
            .p4 {
                width: 9px; height: 9px;
                background: #fbbf8a;
                box-shadow: 0 0 16px 5px rgba(251,191,138,0.5), 0 0 30px 10px rgba(251,191,138,0.15);
            }
            .p5 {
                width: 6px; height: 6px;
                background: #fde9a8;
                box-shadow: 0 0 10px 3px rgba(253,233,168,0.6), 0 0 20px 8px rgba(253,233,168,0.2);
            }
            .p6 {
                width: 11px; height: 11px;
                background: #f9a8d4;
                box-shadow: 0 0 18px 6px rgba(249,168,212,0.5), 0 0 32px 11px rgba(249,168,212,0.15);
            }
            .p7 {
                width: 7px; height: 7px;
                background: #cfb8f5;
                box-shadow: 0 0 13px 4px rgba(207,184,245,0.55), 0 0 26px 9px rgba(207,184,245,0.18);
            }
            @keyframes floatParticle {
                0%, 100% { transform: translate(0, 0) scale(1); }
                25% { transform: translate(12px, -18px) scale(1.2); }
                50% { transform: translate(-6px, -28px) scale(0.85); }
                75% { transform: translate(-14px, -10px) scale(1.1); }
            }

            /* ══ 小星球插画 ══ */
            .illust { display: block; }
            .planet {
                position: absolute;
                bottom: 16%; left: 8%;
                pointer-events: none;
                animation: planetFloat 5s ease-in-out infinite;
            }
            .planet-body {
                width: 54px; height: 54px;
                background: linear-gradient(135deg, #fbbf8a 0%, #f9a8b4 35%, #d4a8e0 65%, #a88fd4 100%);
                border-radius: 50%;
                box-shadow:
                    0 0 22px 8px rgba(249,168,212,0.3),
                    0 0 40px 16px rgba(180,150,210,0.12),
                    inset -6px -6px 12px rgba(0,0,0,0.08),
                    inset 3px 3px 10px rgba(255,255,255,0.25);
                position: relative;
            }
            .planet-ring {
                position: absolute;
                top: -8px; left: -8px;
                width: 70px; height: 70px;
                border: 3px solid transparent;
                border-top-color: rgba(255,255,255,0.4);
                border-right-color: rgba(255,255,255,0.2);
                border-radius: 50%;
                transform: rotate(-20deg);
                animation: ringSpin 8s linear infinite;
            }
            @keyframes planetFloat {
                0%, 100% { transform: translateY(0) rotate(0deg); }
                50% { transform: translateY(-14px) rotate(3deg); }
            }
            @keyframes ringSpin {
                0% { transform: rotate(-20deg); }
                100% { transform: rotate(340deg); }
            }
        }
    </style>
</head>
<body>

    <!-- ══ 桌面端装饰层 ══ -->
    <div class="arc arc1"></div>
    <div class="arc arc2"></div>
    <div class="arc arc3"></div>

    <!-- 温热粒子 -->
    <div class="particle p0" style="top:12%; left:18%; animation: floatParticle 7s ease-in-out infinite; animation-delay: 0s;"></div>
    <div class="particle p1" style="top:20%; right:15%; animation: floatParticle 8s ease-in-out infinite; animation-delay: -1s;"></div>
    <div class="particle p2" style="top:55%; left:8%; animation: floatParticle 6.5s ease-in-out infinite; animation-delay: -2s;"></div>
    <div class="particle p3" style="top:35%; right:10%; animation: floatParticle 7.5s ease-in-out infinite; animation-delay: -3s;"></div>
    <div class="particle p4" style="top:65%; right:20%; animation: floatParticle 8.5s ease-in-out infinite; animation-delay: -4s;"></div>
    <div class="particle p5" style="top:78%; left:22%; animation: floatParticle 6s ease-in-out infinite; animation-delay: -1.5s;"></div>
    <div class="particle p6" style="top:45%; left:14%; animation: floatParticle 7.8s ease-in-out infinite; animation-delay: -3.5s;"></div>
    <div class="particle p7" style="top:28%; left:78%; animation: floatParticle 8.2s ease-in-out infinite; animation-delay: -5s;"></div>

    <!-- 小星球 -->
    <div class="illust planet">
        <div class="planet-body"></div>
        <div class="planet-ring"></div>
    </div>

    <!-- ══ 卡片 ══ -->
    <div class="card">
        <div class="icon">🎮</div>
        <h1>游戏梦工厂</h1>
        <p class="sub">打开魔盒 · 创造世界</p>

        {% with messages = get_flashed_messages(with_categories=true) %}
        {% if messages %}
        {% for category, message in messages %}
        <div class="flash flash-{{ category }}">{{ message }}</div>
        {% endfor %}
        {% endif %}
        {% endwith %}

        <form method="POST" action="{{ url_for('auth.login') }}">
            <div class="field">
                <label>用户名</label>
                <input type="text" name="username" placeholder="你的名字" required autofocus>
            </div>
            <div class="field">
                <label>密码</label>
                <input type="password" name="password" placeholder="你的密码" required>
            </div>
            <label class="remember">
                <input type="checkbox" name="remember">
                <span>记住我</span>
            </label>
            <button type="submit" class="btn">登 录</button>
        </form>

        <p class="link">还没有魔盒？<a href="{{ url_for('auth.register') }}">领取一个</a></p>
    </div>

</body>
</html>
