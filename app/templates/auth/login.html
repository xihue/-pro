<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>登录 — 游戏梦工厂</title>
    <style>
        *,*::before,*::after{box-sizing:border-box;margin:0;padding:0}

        body{
            min-height:100vh;
            font-family:"PingFang SC","Noto Sans SC",-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,sans-serif;
            overflow-x:hidden;
            cursor:default;
            user-select:none;
        }

        /* ── background scene ── */
        .wall{
            position:fixed;inset:0;z-index:0;
            background:radial-gradient(ellipse 140% 80% at 50% 30%, #eaf4fb 0%, #d6eaf8 40%, #c2ddf2 100%);
        }
        .desk{
            position:fixed;inset:auto 0 0 0;height:22%;z-index:1;
            background:linear-gradient(175deg,#d4e6f4 0%,#c8ddf0 3%,#bcd4e8 15%,#b0cce2 40%,#a8c4da 70%,#9dbcd4 100%);
            border-top:1px solid rgba(255,255,255,0.55);
            box-shadow:0 -1px 0 rgba(255,255,255,0.3),0 -4px 20px rgba(120,155,180,0.12);
        }
        .desk::before{
            content:"";position:absolute;inset:0;
            background:
                repeating-linear-gradient(0deg,transparent,transparent 8px,rgba(200,215,230,0.25) 8px,rgba(200,215,230,0.25) 9px),
                repeating-linear-gradient(90deg,transparent,transparent 120px,rgba(190,205,220,0.15) 120px,rgba(190,205,220,0.15) 121px);
            mask-image:linear-gradient(to bottom,transparent 0%,rgba(0,0,0,0.3) 20%,rgba(0,0,0,0.5) 50%,rgba(0,0,0,0.6) 100%);
            -webkit-mask-image:linear-gradient(to bottom,transparent 0%,rgba(0,0,0,0.3) 20%,rgba(0,0,0,0.5) 50%,rgba(0,0,0,0.6) 100%);
        }
        .desk-edge{
            position:fixed;bottom:22%;left:0;right:0;height:2px;z-index:2;
            background:rgba(255,255,255,0.6);
            box-shadow:0 0 8px rgba(200,220,240,0.5);
        }
        .sun-spot{
            position:fixed;bottom:8%;left:25%;width:500px;height:200px;z-index:1;
            background:radial-gradient(ellipse at center,rgba(255,255,255,0.12) 0%,transparent 70%);
            pointer-events:none;
            animation:sunShift 14s ease-in-out infinite;
        }
        @keyframes sunShift{
            0%,100%{transform:translate(0,0) scale(1);opacity:0.7}
            50%{transform:translate(40px,-10px) scale(1.1);opacity:1}
        }
        .light-beam{
            position:fixed;pointer-events:none;z-index:0;
            width:700px;height:600px;top:-300px;left:-100px;
            background:conic-gradient(from 25deg at 15% 85%,rgba(255,255,255,0.1) 0deg,rgba(255,255,255,0.03) 15deg,transparent 30deg);
            animation:beamSway 10s ease-in-out infinite;
        }
        @keyframes beamSway{
            0%,100%{opacity:0.7;transform:rotate(-2deg)}
            50%{opacity:1;transform:rotate(1deg)}
        }
        .fog-layer{
            position:fixed;pointer-events:none;z-index:1;
            bottom:6%;left:0;right:0;height:100px;
            background:radial-gradient(ellipse 80% 100% at 50% 100%,rgba(210,230,245,0.35) 0%,transparent 70%);
            animation:fogBreathe 8s ease-in-out infinite;
        }
        @keyframes fogBreathe{0%,100%{opacity:0.5}50%{opacity:0.8}}

        /* ═══════════ MAIN LAYOUT ═══════════ */
        .page{
            position:relative;z-index:10;
            min-height:100vh;
            display:flex;flex-wrap:wrap;align-items:center;justify-content:center;
            gap:30px;
            padding:60px 20px 80px;
        }

        /* ═══════════ JAR ═══════════ */
        .jar-container{
            flex-shrink:0;
            display:flex;flex-direction:column;align-items:center;
        }
        .magic-jar{
            position:relative;
            width:300px;height:370px;
            filter:drop-shadow(0 16px 32px rgba(100,130,160,0.22));
        }
        .jar-body{
            position:absolute;inset:44px 18px 54px 18px;
            background:
                radial-gradient(ellipse 25% 60% at 22% 35%,rgba(255,255,255,0.5) 0%,transparent 60%),
                radial-gradient(ellipse 15% 45% at 78% 30%,rgba(255,255,255,0.28) 0%,transparent 55%),
                radial-gradient(ellipse 40% 30% at 65% 70%,rgba(245,210,225,0.16) 0%,transparent 60%),
                radial-gradient(ellipse 30% 25% at 35% 75%,rgba(190,235,215,0.1) 0%,transparent 60%),
                linear-gradient(180deg,rgba(255,255,255,0.32) 0%,rgba(255,255,255,0.12) 25%,rgba(255,255,255,0.06) 55%,rgba(255,255,255,0.18) 100%);
            border-radius:50%/42%;
            border:2px solid rgba(255,255,255,0.6);
            box-shadow:
                0 0 40px rgba(175,210,235,0.22) inset,
                0 0 80px rgba(195,225,240,0.1) inset,
                0 0 0 1px rgba(255,255,255,0.3) inset,
                0 8px 36px rgba(120,150,180,0.18);
            overflow:hidden;
            animation:jarBreathe 6s ease-in-out infinite;
        }
        @keyframes jarBreathe{
            0%,100%{box-shadow:0 0 40px rgba(175,210,235,0.22) inset,0 0 80px rgba(195,225,240,0.1) inset,0 0 0 1px rgba(255,255,255,0.3) inset,0 8px 36px rgba(120,150,180,0.18)}
            50%{box-shadow:0 0 55px rgba(180,215,240,0.32) inset,0 0 100px rgba(200,230,245,0.15) inset,0 0 0 1px rgba(255,255,255,0.4) inset,0 12px 44px rgba(120,150,180,0.26)}
        }
        .jar-neck{
            position:absolute;top:26px;left:54px;right:54px;height:28px;z-index:2;
            background:linear-gradient(180deg,rgba(255,255,255,0.55),rgba(255,255,255,0.2),rgba(255,255,255,0.4));
            border-radius:12px 12px 6px 6px;
            border:1.5px solid rgba(255,255,255,0.5);
            box-shadow:0 2px 10px rgba(120,150,170,0.14),0 0 0 1px rgba(255,255,255,0.2) inset;
        }
        .jar-neck::after{
            content:"";position:absolute;top:2px;left:10px;right:10px;height:2px;
            background:rgba(255,255,255,0.7);border-radius:1px;
            box-shadow:0 0 4px rgba(255,255,255,0.4);
        }
        .jar-lid{
            position:absolute;top:12px;left:46px;right:46px;height:26px;z-index:3;
            background:linear-gradient(180deg,#e8d6b5,#dfcdab 15%,#d4be98 35%,#c9b285 55%,#bfa878 75%,#b89f6f);
            border-radius:14px 14px 8px 8px;
            border:1px solid rgba(170,140,100,0.35);
            box-shadow:0 3px 10px rgba(100,75,35,0.2),0 1px 0 rgba(255,245,225,0.5) inset,0 -1px 0 rgba(255,245,225,0.25) inset;
        }
        .jar-lid::before{
            content:"";position:absolute;inset:4px 10px;
            background:repeating-linear-gradient(0deg,transparent,transparent 2px,rgba(180,150,110,0.18) 2px,rgba(180,150,110,0.18) 3px);
            border-radius:3px;
        }
        .jar-lid::after{
            content:"";position:absolute;top:2px;left:20%;right:20%;height:2px;
            background:rgba(255,245,225,0.5);border-radius:1px;
        }
        .jar-base{
            position:absolute;bottom:8px;left:12px;right:12px;height:48px;z-index:1;
            background:linear-gradient(175deg,#e2d0b0,#d8c4a4 15%,#ceb894 40%,#c4ac84 70%,#baa074);
            border-radius:10px 10px 18px 18px;
            border:1px solid rgba(170,140,110,0.3);
            box-shadow:0 6px 20px rgba(90,65,30,0.18),0 1px 0 rgba(255,245,220,0.45) inset,0 -1px 3px rgba(170,140,110,0.25) inset;
        }
        .jar-base::before{
            content:"";position:absolute;top:8px;left:12px;right:12px;height:1px;
            background:rgba(200,170,130,0.25);border-radius:1px;
            box-shadow:0 1px 0 rgba(255,245,225,0.25);
        }
        .jar-base::after{
            content:"";position:absolute;bottom:-8px;
            left:26px;width:20px;height:10px;
            background:linear-gradient(180deg,#c8ac7e,#b89664);
            border-radius:0 0 5px 5px;
            box-shadow:90px 0 0 #c8ac7e,180px 0 0 #c8ac7e,45px 0 0 #c4a878,135px 0 0 #c4a878;
        }
        .jar-label{
            position:absolute;bottom:96px;left:48px;right:48px;height:44px;z-index:1;
            background:rgba(255,255,255,0.16);
            backdrop-filter:blur(4px);-webkit-backdrop-filter:blur(4px);
            border:1px solid rgba(255,255,255,0.22);border-radius:10px;
            display:flex;align-items:center;justify-content:center;
            font-size:12px;color:rgba(255,255,255,0.9);font-weight:700;
            letter-spacing:3px;text-shadow:0 1px 2px rgba(0,0,0,0.08);
            pointer-events:none;
        }

        /* jar contents */
        .jar-world{position:absolute;inset:50px 20px 62px 20px;z-index:0;}
        .pixel-cloud{position:absolute;top:10px;left:42px;}
        .pixel-cloud .block{
            position:absolute;width:10px;height:8px;background:#fff;
            border-radius:3px;opacity:0.85;
            box-shadow:0 0 6px rgba(255,255,255,0.55),0 0 2px rgba(255,255,255,0.8);
        }
        .b1{top:8px;left:6px}.b2{top:4px;left:14px}.b3{top:2px;left:22px}.b4{top:6px;left:30px}
        .b5{top:10px;left:38px;width:14px;height:10px}.b6{top:16px;left:10px;width:12px;height:8px}
        .b7{top:16px;left:26px;width:12px;height:8px}.b8{top:22px;left:18px;width:16px;height:7px}
        .cloud-float{animation:cloudDrift 8s ease-in-out infinite;}
        @keyframes cloudDrift{
            0%,100%{transform:translate(0,0)}25%{transform:translate(18px,-8px)}
            50%{transform:translate(-5px,-14px)}75%{transform:translate(-12px,-3px)}
        }
        .coaster-track{position:absolute;top:118px;left:34px;}
        .coaster-track svg{overflow:visible;}
        .coaster-track path{
            fill:none;stroke:rgba(255,255,255,0.45);stroke-width:3;
            stroke-dasharray:6 4;stroke-linecap:round;
            filter:drop-shadow(0 0 2px rgba(255,255,255,0.25));
            animation:trackShimmer 3s linear infinite;
        }
        @keyframes trackShimmer{0%{stroke-dashoffset:0}100%{stroke-dashoffset:-20}}
        .coaster-cart{
            position:absolute;width:8px;height:6px;
            background:#f2c4d0;border-radius:2px;
            box-shadow:0 0 6px rgba(242,196,208,0.6),0 0 2px rgba(255,255,255,0.4);
        }
        .dice-wrap{position:absolute;top:62px;right:30px;animation:diceFloat 5s ease-in-out infinite;}
        @keyframes diceFloat{
            0%,100%{transform:translateY(0) rotate(0deg)}
            33%{transform:translateY(-15px) rotate(10deg)}
            66%{transform:translateY(-6px) rotate(-8deg)}
        }
        .dice{
            width:26px;height:26px;
            background:linear-gradient(135deg,#fff,#f0f4fa,#e2eaf6,#d4dff0);
            border-radius:5px;border:1px solid rgba(190,205,225,0.5);
            box-shadow:2px 3px 8px rgba(110,135,165,0.25),0 0 10px rgba(190,215,240,0.35),0 0 0 1px rgba(255,255,255,0.35) inset;
            position:relative;
        }
        .dice::after{content:"⚄";position:absolute;inset:0;display:flex;align-items:center;justify-content:center;font-size:15px;color:#a8bcd8;}
        .dice2{
            position:absolute;top:36px;left:24px;width:20px;height:20px;
            background:linear-gradient(135deg,#fff5f7,#fde8ed,#f8dae2,#f0ccd6);
            border-radius:4px;border:1px solid rgba(225,195,205,0.45);
            box-shadow:2px 2px 6px rgba(150,130,140,0.2),0 0 8px rgba(245,215,225,0.3);
            animation:diceFloat 4.5s ease-in-out infinite;animation-delay:-2s;
        }
        .dice2::after{content:"⚂";position:absolute;inset:0;display:flex;align-items:center;justify-content:center;font-size:12px;color:#d8c0cc;}
        .code-star{
            position:absolute;color:rgba(255,255,255,0.7);
            font-family:"SF Mono","Fira Code","Consolas",monospace;
            font-size:10px;white-space:nowrap;
            text-shadow:0 0 8px rgba(255,255,255,0.6),0 0 20px rgba(190,215,240,0.4);
        }
        .cs1{top:28px;left:14px;animation:starShoot 3.5s ease-in-out infinite;}
        .cs2{top:18px;right:14px;animation:starShoot 4.2s ease-in-out infinite;animation-delay:-1.5s;font-size:9px;}
        .cs3{top:90px;left:50%;animation:starShoot2 5s ease-in-out infinite;animation-delay:-3s;}
        @keyframes starShoot{
            0%,100%{transform:translate(0,0) scale(1);opacity:0.7}
            25%{transform:translate(28px,8px) scale(1.3);opacity:1}
            50%{transform:translate(56px,0) scale(0.75);opacity:0.25}
            75%{transform:translate(18px,-5px) scale(1);opacity:0.55}
        }
        @keyframes starShoot2{
            0%,100%{transform:translate(0,0) scale(0.75);opacity:0.45}
            33%{transform:translate(-25px,-10px) scale(1.25);opacity:0.95}
            66%{transform:translate(-48px,2px) scale(0.6);opacity:0.18}
        }
        .sparkle{
            position:absolute;width:3px;height:3px;background:#fff;
            border-radius:50%;animation:sparklePop 2.5s ease-in-out infinite;
            box-shadow:0 0 6px 2px rgba(255,255,255,0.7);
        }
        @keyframes sparklePop{0%,100%{opacity:0.15;transform:scale(0.4)}50%{opacity:1;transform:scale(1.6)}}

        /* ═══════════ AUTH CARD ═══════════ */
        .auth-card{
            position:relative;z-index:10;
            width:320px;max-width:90vw;
            padding:26px 28px;
            background:linear-gradient(175deg,rgba(255,255,255,0.52),rgba(255,255,255,0.36),rgba(245,250,255,0.32));
            backdrop-filter:blur(16px);-webkit-backdrop-filter:blur(16px);
            border:1px solid rgba(255,255,255,0.52);
            border-radius:20px;
            box-shadow:0 10px 36px rgba(120,150,175,0.18),0 0 0 1px rgba(255,255,255,0.4) inset,0 3px 0 rgba(220,235,248,0.25) inset;
            animation:cardAppear 1s ease-out 0.3s both;
        }
        .auth-card::before{
            content:"";position:absolute;top:0;left:10px;right:10px;height:1px;
            background:rgba(255,255,255,0.55);border-radius:1px;
        }
        @keyframes cardAppear{
            from{opacity:0;transform:translateY(20px)}
            to{opacity:1;transform:translateY(0)}
        }
        .auth-card h1{text-align:center;font-size:19px;font-weight:700;color:#4a6074;margin-bottom:2px;letter-spacing:0.5px;}
        .auth-card .subtitle{text-align:center;font-size:12px;color:#8aa0b4;margin-bottom:20px;}
        .flash{padding:7px 10px;border-radius:8px;font-size:11px;margin-bottom:10px;text-align:center;}
        .flash-error{background:rgba(239,68,68,0.06);color:#c44;border:1px solid rgba(239,68,68,0.14);}
        .flash-success{background:rgba(34,197,94,0.06);color:#3a8;border:1px solid rgba(34,197,94,0.14);}
        .flash-info{background:rgba(59,130,246,0.06);color:#58d;border:1px solid rgba(59,130,246,0.14);}
        .field{margin-bottom:12px;}
        .field label{display:block;font-size:10px;font-weight:600;color:#849cb0;margin-bottom:5px;text-transform:uppercase;letter-spacing:1px;}
        .field input{
            width:100%;padding:10px 12px;
            background:rgba(255,255,255,0.5);border:1px solid rgba(175,195,215,0.45);
            border-radius:10px;font-size:14px;font-family:inherit;color:#3a5466;outline:none;transition:all 0.3s;
        }
        .field input::placeholder{color:#b0c4d4;}
        .field input:focus{border-color:#b0cde4;background:rgba(255,255,255,0.8);box-shadow:0 0 0 3px rgba(175,205,230,0.18);}
        .remember-row{
            display:flex;align-items:center;gap:8px;
            font-size:12px;color:#8aa4b8;margin-bottom:16px;cursor:pointer;
        }
        .remember-row input[type="checkbox"]{accent-color:#94b4cc;width:14px;height:14px;}
        .btn-dream{
            width:100%;padding:11px;border:none;border-radius:10px;
            font-size:14px;font-weight:600;font-family:inherit;
            cursor:pointer;color:#fff;
            background:linear-gradient(135deg,#8ab4d4,#a0c8e0,#b4d8ee,#8ab4d4);
            background-size:300% 300%;
            animation:btnShimmer 5s ease infinite;
            box-shadow:0 3px 16px rgba(120,165,195,0.3);
            transition:transform 0.2s,box-shadow 0.3s;
            letter-spacing:1.5px;
        }
        .btn-dream:hover{transform:translateY(-2px);box-shadow:0 5px 22px rgba(120,165,195,0.45);}
        .btn-dream:active{transform:translateY(0);}
        @keyframes btnShimmer{0%,100%{background-position:0% 50%}50%{background-position:100% 50%}}
        .auth-link{text-align:center;margin-top:12px;font-size:12px;color:#8aa4b8;}
        .auth-link a{color:#78a4c0;text-decoration:none;font-weight:500;}
        .auth-link a:hover{color:#5688a8;}

        /* ═══════════ RESPONSIVE ═══════════ */
        /* Small window: jar and card stacked */
        @media(max-width:720px){
            .page{flex-direction:column;gap:16px;padding:30px 16px 60px;}
            .magic-jar{width:240px;height:300px;}
            .jar-body{inset:36px 14px 44px 14px;}
            .jar-neck{top:22px;left:42px;right:42px;height:22px;}
            .jar-lid{top:10px;left:36px;right:36px;height:22px;}
            .jar-base{bottom:6px;left:10px;right:10px;height:40px;}
            .jar-base::after{left:20px;width:16px;height:8px;box-shadow:70px 0 0 #c8ac7e,140px 0 0 #c8ac7e,35px 0 0 #c4a878,105px 0 0 #c4a878;}
            .jar-label{bottom:76px;left:38px;right:38px;height:36px;font-size:11px;letter-spacing:2px;}
            .jar-world{inset:40px 16px 50px 16px;}
            .auth-card{width:300px;padding:22px 24px;}
        }
        /* Phone: hide jar, show only card */
        @media(max-width:480px){
            .page{padding:24px 12px 50px;}
            .jar-container{display:none;}
            .auth-card{
                width:100%;max-width:340px;padding:24px 20px;
                background:rgba(255,255,255,0.75);
                backdrop-filter:none;-webkit-backdrop-filter:none;
                border:1px solid rgba(200,210,225,0.5);
                box-shadow:0 8px 32px rgba(120,150,175,0.2);
            }
            .auth-card h1{font-size:17px;}
        }
    </style>
</head>
<body>

    <div class="wall"></div>
    <div class="light-beam"></div>
    <div class="desk"></div>
    <div class="desk-edge"></div>
    <div class="sun-spot"></div>
    <div class="fog-layer"></div>

    <div class="page">

        <!-- Magic Jar -->
        <div class="jar-container">
            <div class="magic-jar">
                <div class="jar-lid"></div>
                <div class="jar-neck"></div>
                <div class="jar-body">
                    <div class="jar-world">
                        <div class="pixel-cloud cloud-float">
                            <div class="block b1"></div><div class="block b2"></div><div class="block b3"></div><div class="block b4"></div>
                            <div class="block b5"></div><div class="block b6"></div><div class="block b7"></div><div class="block b8"></div>
                        </div>
                        <div class="coaster-track" style="top:118px;left:34px;">
                            <svg width="170" height="50" viewBox="0 0 170 50">
                                <path d="M5,38 Q30,-8 50,22 Q75,45 95,12 Q115,-18 135,28 Q155,50 165,32"/>
                            </svg>
                            <div class="coaster-cart" style="top:0;left:5px;"></div>
                        </div>
                        <div class="dice-wrap" style="top:104px;right:46px;"><div class="dice"></div></div>
                        <div class="dice2" style="top:145px;right:62px;"></div>
                        <span class="code-star cs1">< /></span>
                        <span class="code-star cs2"><html></span>
                        <span class="code-star cs3"><div></span>
                        <div class="sparkle" style="top:40px;left:40%;animation-delay:0s;"></div>
                        <div class="sparkle" style="top:65px;left:24%;animation-delay:-0.6s;"></div>
                        <div class="sparkle" style="top:55px;right:20%;animation-delay:-1.2s;"></div>
                        <div class="sparkle" style="top:90px;left:52%;animation-delay:-1.8s;"></div>
                        <div class="sparkle" style="top:125px;left:14%;animation-delay:-0.3s;"></div>
                        <div class="sparkle" style="top:140px;right:16%;animation-delay:-1.5s;"></div>
                        <div class="sparkle" style="top:26px;left:46%;animation-delay:-2.2s;"></div>
                        <div class="sparkle" style="top:160px;left:48%;animation-delay:-0.8s;"></div>
                    </div>
                    <div class="jar-label">🎮 GAME FACTORY</div>
                </div>
                <div class="jar-base"></div>
            </div>
        </div>

        <!-- Auth Card -->
        <div class="auth-card">
            <h1>✨ 游戏梦工厂</h1>
            <p class="subtitle">打开魔盒 · 创造世界</p>

            {% with messages = get_flashed_messages(with_categories=true) %}
            {% if messages %}
            {% for category, message in messages %}
            <div class="flash flash-{{ category }}">{{ message }}</div>
            {% endfor %}
            {% endif %}
            {% endwith %}

            <form method="POST" action="{{ url_for('auth.login') }}">
                <div class="field">
                    <label>用户名</label>
                    <input type="text" name="username" placeholder="你的名字" required autofocus>
                </div>
                <div class="field">
                    <label>密码</label>
                    <input type="password" name="password" placeholder="你的密码" required>
                </div>
                <label class="remember-row">
                    <input type="checkbox" name="remember" id="remember">
                    <span>记住我</span>
                </label>
                <button type="submit" class="btn-dream">登 录</button>
            </form>

            <p class="auth-link">还没有魔盒？<a href="{{ url_for('auth.register') }}">领取一个 →</a></p>
        </div>

    </div>

    <script>
    (function cartLoop(){
        var cart=document.querySelector('.coaster-cart');
        if(!cart)return;
        var phase=0;
        setInterval(function(){
            phase=(phase+0.7)%100;
            var x=5+phase*1.6;
            var y=Math.sin(phase*0.22)*13+14;
            cart.style.transform='translate('+x+'px,'+y+'px)';
        },50);
    })();
    </script>
