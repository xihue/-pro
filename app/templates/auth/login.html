<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>登录 — 游戏梦工厂</title>
    <style>
        /* ═══════════════════════════════════════════
           MOBILE FIRST — simple and reliable
           ═══════════════════════════════════════════ */
        *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

        body {
            font-family: "PingFang SC", "Noto Sans SC", -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
            background: #f3eef8;
            min-height: 100vh;
            min-height: 100dvh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 20px;
        }

        .card {
            width: 100%;
            max-width: 340px;
            background: #fff;
            border-radius: 20px;
            padding: 32px 26px;
            box-shadow: 0 4px 24px rgba(100, 80, 160, 0.08);
        }

        .card .icon {
            text-align: center;
            font-size: 44px;
            margin-bottom: 6px;
        }

        .card h1 {
            text-align: center;
            font-size: 20px;
            font-weight: 700;
            color: #4338ca;
            margin-bottom: 2px;
        }

        .card .sub {
            text-align: center;
            font-size: 13px;
            color: #999;
            margin-bottom: 22px;
        }

        .flash {
            padding: 8px 12px;
            border-radius: 8px;
            font-size: 12px;
            margin-bottom: 10px;
            text-align: center;
        }
        .flash-error { background: #fef2f2; color: #d44; border: 1px solid #fecaca; }
        .flash-success { background: #f0fdf4; color: #3a8; border: 1px solid #bbf7d0; }

        .field {
            margin-bottom: 14px;
        }
        .field label {
            display: block;
            font-size: 12px;
            font-weight: 600;
            color: #6b6b8a;
            margin-bottom: 6px;
            letter-spacing: 0.5px;
        }
        .field input {
            width: 100%;
            padding: 11px 14px;
            border: 1px solid #e0dde8;
            border-radius: 10px;
            font-size: 15px;
            font-family: inherit;
            color: #3a3a5a;
            outline: none;
            -webkit-appearance: none;
            transition: border-color 0.2s, box-shadow 0.2s;
        }
        .field input:focus {
            border-color: #7c4dff;
            box-shadow: 0 0 0 3px rgba(124, 77, 255, 0.1);
        }
        .field input::placeholder { color: #c0bcd0; }

        .remember {
            display: flex;
            align-items: center;
            gap: 8px;
            font-size: 13px;
            color: #777;
            margin-bottom: 18px;
            cursor: pointer;
        }
        .remember input { width: 16px; height: 16px; accent-color: #7c4dff; }

        .btn {
            width: 100%;
            padding: 13px;
            border: none;
            border-radius: 10px;
            font-size: 15px;
            font-weight: 700;
            font-family: inherit;
            color: #fff;
            background: #7c4dff;
            cursor: pointer;
            letter-spacing: 1.5px;
            transition: transform 0.2s, box-shadow 0.3s;
        }
        .btn:active { transform: scale(0.97); }

        .link {
            text-align: center;
            margin-top: 16px;
            font-size: 13px;
            color: #999;
        }
        .link a {
            color: #7c4dff;
            text-decoration: none;
            font-weight: 500;
        }

        /* 桌面端装饰 — 手机端隐藏 */
        .deco { display: none; }

        /* ═══════════════════════════════════════════
           DESKTOP — dreamy magic jar theme
           ═══════════════════════════════════════════ */
        @media (min-width: 768px) {
            body {
                background:
                    radial-gradient(ellipse 50% 40% at 30% 25%, rgba(180, 160, 220, 0.25) 0%, transparent 50%),
                    radial-gradient(ellipse 45% 35% at 70% 30%, rgba(200, 180, 230, 0.2) 0%, transparent 50%),
                    radial-gradient(ellipse 55% 45% at 50% 70%, rgba(180, 200, 230, 0.18) 0%, transparent 50%),
                    #f3eef8;
                position: relative;
            }

            .card {
                padding: 36px 30px;
                box-shadow:
                    0 8px 40px rgba(100, 80, 160, 0.1),
                    0 0 0 1px rgba(255,255,255,0.5) inset;
                position: relative;
                z-index: 10;
            }

            .btn:hover {
                transform: translateY(-2px);
                box-shadow: 0 6px 24px rgba(124, 77, 255, 0.4);
            }

            /* ── 漂浮装饰 ── */
            .deco {
                display: block;
                position: absolute;
                pointer-events: none;
            }

            @keyframes drift {
                0%, 100% { transform: translate(0, 0); }
                25% { transform: translate(15px, -10px); }
                50% { transform: translate(-8px, -16px); }
                75% { transform: translate(-12px, -3px); }
            }
            @keyframes bob {
                0%, 100% { transform: translateY(0); }
                50% { transform: translateY(-12px); }
            }

            .deco-star {
                animation: twinkle 3.5s ease-in-out infinite;
                position: absolute;
                pointer-events: none;
            }
            @keyframes twinkle {
                0%, 100% { opacity: 0.25; transform: scale(0.6); }
                50% { opacity: 0.9; transform: scale(1.2); }
            }

            .deco-cloud {
                top: 6%;
                left: 10%;
                animation: drift 8s ease-in-out infinite;
                opacity: 0.7;
            }
            .deco-cloud .b {
                position: absolute;
                background: rgba(255, 255, 255, 0.7);
                border-radius: 3px;
            }
            .b1 { width: 14px; height: 11px; top: 0; left: 20px; }
            .b2 { width: 12px; height: 9px; top: -6px; left: 10px; }
            .b3 { width: 16px; height: 12px; top: 4px; left: 32px; }
            .b4 { width: 18px; height: 11px; top: 12px; left: 16px; }

            .deco-diamond {
                top: 12%;
                right: 12%;
                width: 42px;
                height: 42px;
                background: linear-gradient(135deg, #fff, #f5f0ff, #ede4fa);
                border-radius: 10px;
                border: 1.5px solid rgba(180, 170, 210, 0.5);
                box-shadow: 2px 3px 12px rgba(130, 120, 170, 0.18);
                display: flex;
                align-items: center;
                justify-content: center;
                font-size: 18px;
                color: #c4b8e0;
                animation: bob 6s ease-in-out infinite;
            }
            .deco-diamond::after { content: "◆"; }
        }
    </style>
</head>
<body>

    <!-- 桌面端装饰 -->
    <div class="deco deco-cloud">
        <div class="b b1"></div><div class="b b2"></div><div class="b b3"></div><div class="b b4"></div>
    </div>
    <div class="deco deco-diamond"></div>
    <span class="deco-star" style="top: 8%; left: 26%; font-size: 18px; animation-delay: 0s;">✦</span>
    <span class="deco-star" style="top: 18%; left: 66%; font-size: 13px; animation-delay: 0.8s;">✧</span>
    <span class="deco-star" style="top: 55%; right: 8%; font-size: 15px; animation-delay: 1.6s;">⋆</span>
    <span class="deco-star" style="top: 72%; left: 18%; font-size: 14px; animation-delay: 2.4s;">✧</span>
    <span class="deco-star" style="top: 35%; left: 78%; font-size: 11px; animation-delay: 0.4s;">✦</span>

    <div class="card">
        <div class="icon">🎮</div>
        <h1>游戏梦工厂</h1>
        <p class="sub">打开魔盒 · 创造世界</p>

        {% with messages = get_flashed_messages(with_categories=true) %}
        {% if messages %}
        {% for category, message in messages %}
        <div class="flash flash-{{ category }}">{{ message }}</div>
        {% endfor %}
        {% endif %}
        {% endwith %}

        <form method="POST" action="{{ url_for('auth.login') }}">
            <div class="field">
                <label>用户名</label>
                <input type="text" name="username" placeholder="你的名字" required autofocus>
            </div>
            <div class="field">
                <label>密码</label>
                <input type="password" name="password" placeholder="你的密码" required>
            </div>
            <label class="remember">
                <input type="checkbox" name="remember">
                <span>记住我</span>
            </label>
            <button type="submit" class="btn">登 录</button>
        </form>

        <p class="link">还没有魔盒？<a href="{{ url_for('auth.register') }}">领取一个</a></p>
    </div>

</body>
</html>
