<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>登录 — 游戏梦工厂</title>
    <style>
        body {
            margin: 0;
            padding: 0;
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
            background: #e8eaf6;
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
        }
        .card {
            width: 320px;
            background: #fff;
            border-radius: 16px;
            padding: 30px 24px;
            box-shadow: 0 4px 24px rgba(0,0,0,0.08);
        }
        .card h1 {
            text-align: center;
            font-size: 20px;
            color: #3b3b98;
            margin: 0 0 4px;
        }
        .card .sub {
            text-align: center;
            font-size: 13px;
            color: #888;
            margin-bottom: 20px;
        }
        .flash {
            padding: 8px 12px;
            border-radius: 8px;
            font-size: 12px;
            margin-bottom: 10px;
            text-align: center;
        }
        .flash-error { background: #fef2f2; color: #c44; }
        .flash-success { background: #f0fdf4; color: #3a8; }
        .field {
            margin-bottom: 14px;
        }
        .field label {
            display: block;
            font-size: 12px;
            font-weight: 600;
            color: #666;
            margin-bottom: 6px;
        }
        .field input {
            width: 100%;
            padding: 10px 12px;
            border: 1px solid #ddd;
            border-radius: 10px;
            font-size: 15px;
            box-sizing: border-box;
        }
        .field input:focus {
            outline: none;
            border-color: #7c4dff;
        }
        .remember {
            display: flex;
            align-items: center;
            gap: 8px;
            font-size: 13px;
            color: #777;
            margin-bottom: 16px;
        }
        .btn {
            width: 100%;
            padding: 12px;
            border: none;
            border-radius: 10px;
            font-size: 15px;
            font-weight: 600;
            color: #fff;
            background: #7c4dff;
            cursor: pointer;
        }
        .link {
            text-align: center;
            margin-top: 14px;
            font-size: 13px;
            color: #888;
        }
        .link a { color: #7c4dff; text-decoration: none; }
    </style>
</head>
<body>
    <div class="card">
        <h1>🎮 游戏梦工厂</h1>
        <p class="sub">打开魔盒 · 创造世界</p>

        {% with messages = get_flashed_messages(with_categories=true) %}
        {% if messages %}
        {% for category, message in messages %}
        <div class="flash flash-{{ category }}">{{ message }}</div>
        {% endfor %}
        {% endif %}
        {% endwith %}

        <form method="POST" action="{{ url_for('auth.login') }}">
            <div class="field">
                <label>用户名</label>
                <input type="text" name="username" placeholder="你的名字" required autofocus>
            </div>
            <div class="field">
                <label>密码</label>
                <input type="password" name="password" placeholder="你的密码" required>
            </div>
            <label class="remember">
                <input type="checkbox" name="remember">
                <span>记住我</span>
            </label>
            <button type="submit" class="btn">登 录</button>
        </form>

        <p class="link">还没有魔盒？<a href="{{ url_for('auth.register') }}">领取一个</a></p>
    </div>
</body>
</html>
