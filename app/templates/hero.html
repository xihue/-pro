<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>网页游戏梦工厂 — 把你的想象变成游戏</title>
    <style>
        *,*::before,*::after{box-sizing:border-box;margin:0;padding:0}

        html, body {
            height: 100%;
            font-family: "PingFang SC","Noto Sans SC",-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,sans-serif;
            -webkit-font-smoothing: antialiased;
        }

        body {
            background: #e8eaf6;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
            min-height: 100dvh;
            padding: 40px 20px;
            text-align: center;
        }

        /* ── Emblem ── */
        .hero-emblem {
            font-size: 56px;
            margin-bottom: 12px;
        }

        /* ── Title ── */
        .hero-title {
            font-size: clamp(32px, 8vw, 64px);
            font-weight: 800;
            letter-spacing: -1px;
            line-height: 1.15;
            margin-bottom: 12px;
            /* Solid color — no gradient tricks that break on mobile */
            color: #5c6bc0;
        }

        /* ── Subtitle & Desc ── */
        .hero-subtitle {
            font-size: clamp(14px, 2.5vw, 19px);
            color: #4a5568;
            margin-bottom: 6px;
            font-weight: 400;
            line-height: 1.5;
        }
        .hero-desc {
            font-size: clamp(13px, 1.8vw, 15px);
            color: #5a6a80;
            margin-bottom: 36px;
            line-height: 1.7;
            max-width: 480px;
        }

        /* ── CTA Button ── */
        .btn-create {
            display: inline-block;
            padding: 16px 48px;
            font-size: 18px;
            font-weight: 700;
            font-family: inherit;
            color: #fff;
            text-decoration: none;
            border: none;
            border-radius: 50px;
            cursor: pointer;
            background: #7c4dff;
            box-shadow: 0 6px 28px rgba(124,77,255,0.35);
            transition: all 0.3s;
            letter-spacing: 2px;
            -webkit-tap-highlight-color: transparent;
        }
        .btn-create:active {
            transform: scale(0.96);
        }

        /* ── CTA hint ── */
        .cta-hint {
            margin-top: 14px;
            font-size: 12px;
            color: #7a8a9e;
            letter-spacing: 0.5px;
        }

        /* ── Feature Pills ── */
        .feature-pills {
            display: flex;
            flex-wrap: wrap;
            justify-content: center;
            gap: 10px;
            margin-top: 32px;
            max-width: 500px;
        }
        .pill {
            padding: 8px 18px;
            border-radius: 20px;
            font-size: 13px;
            font-weight: 500;
            background: rgba(255,255,255,0.7);
            border: 1px solid rgba(200,210,230,0.5);
            color: #4a5a70;
            white-space: nowrap;
        }

        /* ── Mobile ── */
        @media (max-width: 480px) {
            body { padding: 30px 16px; }
            .hero-emblem { font-size: 42px; }
            .btn-create { padding: 14px 36px; font-size: 16px; letter-spacing: 1px; }
            .feature-pills { gap: 6px; margin-top: 24px; }
            .pill { padding: 6px 12px; font-size: 12px; }
            .hero-desc { margin-bottom: 28px; }
        }
    </style>
</head>
<body>

    <div class="hero-emblem">🎮</div>
    <h1 class="hero-title">网页游戏<br>梦工厂</h1>
    <p class="hero-subtitle">把你脑袋里的奇思妙想，变成一个能玩的游戏</p>
    <p class="hero-desc">用自然语言告诉 AI 你想玩什么——贪吃蛇、飞机大战、塔防、跑酷……只需一句话，剩下的交给魔法。</p>

    <a href="/game/create" class="btn-create">✨ 开始创造</a>
    <p class="cta-hint">免费，无需编程</p>

    <div class="feature-pills">
        <span class="pill">🐍 贪吃蛇</span>
        <span class="pill">✈️ 飞机大战</span>
        <span class="pill">🏰 塔防</span>
        <span class="pill">🏃 跑酷</span>
        <span class="pill">🧱 俄罗斯方块</span>
        <span class="pill">🔫 射击</span>
        <span class="pill">🎯 更多……</span>
    </div>

    <script>
    // Keyboard Easter egg: press "G" to jump to create
    document.addEventListener('keydown', function(e){
        if (e.key === 'g' || e.key === 'G') {
            var btn = document.querySelector('.btn-create');
            if (btn) {
                btn.style.transform = 'scale(1.1)';
                setTimeout(function(){ btn.style.transform = ''; }, 200);
                btn.click();
            }
        }
    });
    </script>

</body>
</html>
