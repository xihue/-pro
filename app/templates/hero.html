<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>网页游戏梦工厂</title>
    <style>
        body {
            margin: 0;
            padding: 40px 20px;
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
            background: #e8eaf6;
            text-align: center;
        }
        h1 {
            font-size: 40px;
            color: #3b3b98;
            margin-bottom: 10px;
        }
        p {
            font-size: 16px;
            color: #4a4a6a;
            margin-bottom: 8px;
            line-height: 1.6;
        }
        .desc {
            font-size: 14px;
            color: #6a6a8a;
            margin-bottom: 30px;
        }
        .btn {
            display: inline-block;
            padding: 14px 40px;
            font-size: 18px;
            font-weight: bold;
            color: #fff;
            background: #7c4dff;
            border-radius: 50px;
            text-decoration: none;
            margin-bottom: 10px;
        }
        .hint {
            font-size: 12px;
            color: #999;
            margin-bottom: 30px;
        }
        .tags {
            display: flex;
            flex-wrap: wrap;
            justify-content: center;
            gap: 8px;
            max-width: 400px;
            margin: 0 auto;
        }
        .tag {
            padding: 6px 14px;
            background: #fff;
            border-radius: 20px;
            font-size: 13px;
            color: #555;
        }
    </style>
</head>
<body>
    <div style="font-size:50px;margin-bottom:10px;">🎮</div>
    <h1>网页游戏梦工厂</h1>
    <p>把你脑袋里的奇思妙想，变成一个能玩的游戏</p>
    <p class="desc">用自然语言告诉 AI 你想玩什么——贪吃蛇、飞机大战、塔防、跑酷……<br>只需一句话，剩下的交给魔法。</p>

    <a href="/game/create" class="btn">✨ 开始创造</a>
    <p class="hint">免费，无需编程</p>

    <div class="tags">
        <span class="tag">🐍 贪吃蛇</span>
        <span class="tag">✈️ 飞机大战</span>
        <span class="tag">🏰 塔防</span>
        <span class="tag">🏃 跑酷</span>
        <span class="tag">🧱 俄罗斯方块</span>
        <span class="tag">🔫 射击</span>
    </div>
</body>
</html>
