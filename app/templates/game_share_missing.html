<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>游戏未找到 — AI 游戏梦工厂</title>
    <style>
        *,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
        body{
            min-height:100vh;min-height:100dvh;display:flex;align-items:center;justify-content:center;
            font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,sans-serif;
            background:linear-gradient(135deg,#1a1a2e,#16213e,#0f3460);
            color:#fff;
        }
        .missing-card{
            text-align:center;padding:50px 30px;max-width:420px;
        }
        .missing-icon{font-size:64px;margin-bottom:16px}
        .missing-card h1{font-size:22px;margin-bottom:8px}
        .missing-card p{color:rgba(255,255,255,0.5);font-size:14px;line-height:1.6;margin-bottom:28px}
        .btn-home{
            display:inline-block;padding:12px 28px;
            background:linear-gradient(135deg,#7c3aed,#a78bfa);
            border:none;border-radius:12px;color:#fff;
            font-size:15px;font-weight:600;text-decoration:none;
            transition:all 0.2s;
        }
        .btn-home:hover{transform:translateY(-2px);box-shadow:0 6px 24px rgba(124,58,237,0.4)}
    </style>
</head>
<body>
    <div class="missing-card">
        <div class="missing-icon">🫧</div>
        <h1>这个分享链接好像失效了</h1>
        <p>游戏可能已经被作者删除，或者链接不正确。<br>来做一个属于你自己的游戏吧！</p>
        <a href="/" class="btn-home">✨ 去游戏梦工厂</a>
    </div>
</body>
</html>
